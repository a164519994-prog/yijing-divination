<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>易境后端API测试</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 { color: #c43636; margin-bottom: 20px; text-align: center; }
    .btn {
      background: #c43636;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
      width: 100%;
      margin-top: 20px;
      transition: background 0.3s;
    }
    .btn:hover { background: #a02a2a; }
    .result {
      margin-top: 20px;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 10px;
      display: none;
    }
    .result.show { display: block; }
    .result h3 { color: #333; margin-bottom: 10px; }
    .result pre {
      background: #1a1a2e;
      color: #eee;
      padding: 15px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 12px;
    }
    .status {
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }
    .status.ok { background: #d4edda; color: #155724; }
    .status.error { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>
  <div class="container">
    <h1>易境后端API测试</h1>
    
    <div id="healthStatus" class="status"></div>
    
    <button class="btn" onclick="testAPI()">测试深度解卦API</button>
    
    <div id="result" class="result">
      <h3>API响应:</h3>
      <pre id="response"></pre>
    </div>
  </div>

  <script>
    async function checkHealth() {
      const statusEl = document.getElementById('healthStatus');
      try {
        const response = await fetch('http://localhost:3001/health');
        const data = await response.json();
        statusEl.className = 'status ok';
        statusEl.textContent = '✓ 后端服务运行正常';
      } catch (error) {
        statusEl.className = 'status error';
        statusEl.textContent = '✗ 后端服务未运行，请先启动后端: node backend/server.js';
      }
    }

    async function testAPI() {
      const resultEl = document.getElementById('result');
      const responseEl = document.getElementById('response');
      
      resultEl.classList.add('show');
      responseEl.textContent = '正在请求...';
      
      try {
        const response = await fetch('http://localhost:3001/api/dify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            query: '我的事业发展如何？',
            hexagram: {
              id: 1,
              name: '乾',
              pinyin: 'qián',
              english: 'The Creative',
              judgment: '元亨利贞',
              tag: '上吉'
            },
            topic: 'career'
          })
        });
        
        const data = await response.json();
        responseEl.textContent = JSON.stringify(data, null, 2);
      } catch (error) {
        responseEl.textContent = '请求失败: ' + error.message;
      }
    }

    checkHealth();
  </script>
</body>
</html>
